<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vedtrixalabz | Coming Soon</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      height: 100vh;
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0d6efd, #6f42c1, #0dcaf0);
      background-size: 300% 300%;
      animation: gradientMove 8s ease infinite;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glass {
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    .loader {
      width: 70px;
      height: 70px;
      border: 6px solid rgba(255,255,255,0.2);
      border-top: 6px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 25px auto;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>

<body>

<div class="glass">
  <h1 class="display-4 fw-bold pulse">🚀 Coming Soon</h1>
  
  <p class="lead mt-3">
    We are building something awesome for making your business shine bright.
  </p>

  <!-- Loader -->
  <div class="loader"></div>

  <p class="mt-3">Please wait while we launch...</p>

  <!-- Optional Button -->
  <!-- <a href="#" class="btn btn-light mt-3 px-4 py-2 fw-semibold rounded-pill">
    Notify Me
  </a> -->
</div>

</body>
</html>
